name: Pipeline de Autoentrenamiento

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: "0 3 * * *"

jobs:
  pipeline:

    runs-on: ubuntu-latest

    steps:

      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r dependencias.txt

      - name: Verificar estructura del proyecto
        run: |
          echo "Contenido del proyecto:"
          ls -R

      - name: Ejecutar pipeline automático
        run: |
          python scripts/main.py

      - name: Mostrar artefactos generados
        run: |
          echo "=== Modelos ==="
          ls -R models || true

          echo "=== Reportes ==="
          ls -R reports || true

          echo "=== Datos archivados ==="
          ls -R data/archive || true